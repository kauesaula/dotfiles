# E N T R A D A S   E   I N P U T S
# https://wiki.hypr.land/Configuring/Monitors/
monitor = eDP-1, 1920x1080@60, 0x0, 1   # Ancoragem do monitor interno
monitor = , preferred, auto-left, 1   # Regra plug-n-play para HDMI (configuração Estender)

# Regra de Clamshell (Uso com a tampa abaixada)
bindl = , switch:on:Lid Switch, exec, hyprctl keyword monitor "eDP-1, disable"
bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitor "eDP-1, 1920x1080@60, 0x0, 1"


# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = br
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}



# <https://wiki.hypr.land/Configuring/Gestures>
gesture = 3, horizontal, workspace

# Example per-device config; <https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs> for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}



# K E Y B I N D S
# <https://wiki.hypr.land/Configuring/Keywords/>
$mainMod = SUPER   # Define a tecla SUPER/Meta como modifier principal

# <https://wiki.hypr.land/Configuring/Binds/ for more>
bind = $mainMod, Return, exec, $terminal   # Abre o terminal
bind = $mainMod, Q, killactive,   # Fecha a janela ativa
bind = $mainMod, L, exec, hyprlock   # Bloqueia a tela
bind = $mainMod ALT,  L, exit,   # Realiza logout da sessão
bind = $mainMod, E, exec, $fileManager   # Abre o File Manager
bind = $mainMod, F, togglefloating, ###
bind = $mainMod, R, exec, $menu   # Abre o App Launcher
bind = $mainMod, P, pseudo, # dwindle
# bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, B, exec, librewolf   # Abre o Navegador
bind = $mainMod, O, exec, flatpak run md.obsidian.Obsidian   # Abre o Obsidian
bind = $mainMod, N, exec, swaync-client -t -sw   # Central de Notificações

# Binds de atalho
bind = $mainMod SHIFT, P, exec, ~/.config/hypr/scripts/toggle_monitor.sh   # Ativa/desativa o monitor duplo
bind = $mainMod SHIFT, W, exec, killall waybar && waybar & disown   # Reinicia o Waybar e aplica as customizações
bind = $mainMod, V, exec, ~/.config/hypr/scripts/smart_clipboard.sh   # Abre o Clipboard

# Binds de controle de hardware
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 5%-

# Binds de navegação de janelas
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Troca a janela de posição no grid
bind = $mainMod SHIFT, left, swapwindow, l
bind = $mainMod	SHIFT, right, swapwindow, r
bind = $mainMod	SHIFT, up, swapwindow, u
bind = $mainMod	SHIFT, down, swapwindow, d

# Alterna entre Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
# bind = $mainMod, 5, workspace, 5
# bind = $mainMod, 6, workspace, 6
# bind = $mainMod, 7, workspace, 7
# bind = $mainMod, 8, workspace, 8
# bind = $mainMod, 9, workspace, 9
# bind = $mainMod, 0, workspace, 10

# Envia a janela desejada para um workspace específico
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
# bind = $mainMod SHIFT, 5, movetoworkspace, 5
# bind = $mainMod SHIFT, 6, movetoworkspace, 6
# bind = $mainMod SHIFT, 7, movetoworkspace, 7
# bind = $mainMod SHIFT, 8, movetoworkspace, 8
# bind = $mainMod SHIFT, 9, movetoworkspace, 9
# bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special workspace - Scratchpad
bind = $mainMod, S, togglespecialworkspace, scratchpad
bind = $mainMod SHIFT, S, movetoworkspace, special:scratchpad

# Navegação entre Workspaces usando o Scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
